name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-unit-contract:
    name: Backend Unit + Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install PipeWire CLI (pactl) for audioRoutingService
        run: sudo apt-get update && sudo apt-get install -y pulseaudio-utils

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend (errors only; warnings are pre-existing baseline)
        working-directory: backend
        run: npm run lint

      - name: Run unit and contract tests with coverage
        working-directory: backend
        run: npm test -- --coverage --maxWorkers=2

      - name: Check coverage ratchet
        working-directory: backend
        run: npm run coverage:check

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install PipeWire CLI (pactl) for audioRoutingService
        run: sudo apt-get update && sudo apt-get install -y pulseaudio-utils

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

  scanner-tests:
    name: Scanner Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            ALNScanner/package-lock.json
            aln-memory-scanner/package-lock.json
            config-tool/package-lock.json

      - name: ALNScanner unit tests with coverage
        working-directory: ALNScanner
        run: npm ci && npm test -- --coverage

      - name: ALNScanner coverage ratchet
        working-directory: ALNScanner
        run: npm run coverage:check

      - name: PWA Scanner unit tests
        working-directory: aln-memory-scanner
        run: npm ci && npm test

      - name: Config Tool unit tests
        working-directory: config-tool
        run: npm ci && npm test

      - name: Config Tool lint
        working-directory: config-tool
        run: npm run lint

  esp32-tests:
    name: ESP32 Native Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        working-directory: arduino-cyd-player-scanner
        run: pio test -e native

  scripts-tests:
    name: Notion Sync Scripts Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install script dependencies
        run: pip install -r scripts/requirements.txt pytest

      - name: Run scripts unit tests
        working-directory: scripts
        run: python3 -m pytest tests/ -v

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-contract, backend-integration, backend-e2e-tier-l, scanner-tests, esp32-tests, scripts-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-unit-contract.result }}" != "success" ]; then
            echo "Backend unit+contract tests failed"
            exit 1
          fi
          if [ "${{ needs.backend-integration.result }}" != "success" ]; then
            echo "Backend integration tests failed"
            exit 1
          fi
          if [ "${{ needs.backend-e2e-tier-l.result }}" != "success" ]; then
            echo "Backend E2E Tier L failed"
            exit 1
          fi
          if [ "${{ needs.scanner-tests.result }}" != "success" ]; then
            echo "Scanner tests failed"
            exit 1
          fi
          if [ "${{ needs.esp32-tests.result }}" != "success" ]; then
            echo "ESP32 tests failed"
            exit 1
          fi
          if [ "${{ needs.scripts-tests.result }}" != "success" ]; then
            echo "Scripts tests failed"
            exit 1
          fi
          echo "All checks passed"

  backend-e2e-tier-l:
    name: Backend E2E Tier L (logic/UI floor)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # ALNScanner's npm ci rides the same cache (review CI nit)
          cache-dependency-path: |
            backend/package-lock.json
            ALNScanner/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: backend
        run: npx playwright install chromium --with-deps

      # backend/public/gm-scanner symlinks to ALNScanner/dist — build it so
      # Tier L exercises the CURRENT scanner, not a stale committed dist
      - name: Build GM Scanner dist
        working-directory: ALNScanner
        run: npm ci && npm run build

      # Tier L = logic/UI flows only (@hardware excluded). Capability gates
      # make hardware-dependent tests skip LOUDLY on this toolless runner;
      # the manifest reporter prints what was probed. workers=3 is safe for
      # Tier L: per-flow orchestrators bind random ports, memory storage,
      # no UDP discovery in test env, and the system-global resources that
      # force workers=1 (Chromium kiosk, pkill, real AV PID files) are all
      # Tier H concerns.
      - name: Run Tier L E2E
        working-directory: backend
        run: npm run test:e2e:tier-l

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tier-l-playwright-report
          path: backend/playwright-report/
          retention-days: 7

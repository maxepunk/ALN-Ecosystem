            required:
              - code
              - message
            properties:
              code:
                type: string
                description: Error code
                enum:
                  - AUTH_REQUIRED
                  - AUTH_INVALID
                  - DEVICE_ID_COLLISION
                  - PERMISSION_DENIED
                  - VALIDATION_ERROR
                  - SESSION_NOT_FOUND
                  - TOKEN_NOT_FOUND
                  - DUPLICATE_TRANSACTION
                  - INVALID_REQUEST
                  - VLC_ERROR
                  - INTERNAL_ERROR
                example: "TOKEN_NOT_FOUND"
              message:
                type: string
                description: User-friendly error message
                example: "Token not found in database"
              details:
                type: object
                nullable: true
                description: Optional error details
                example: null
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T20:15:30.100Z"

    # ============================================================================
    # UNIFIED SERVICE STATE (1 event — sole push mechanism for service domains)
    # ============================================================================

    ServiceState:
      name: service:state
      title: Unified Service State Push
      summary: Full state snapshot for a service domain
      description: |
        Emitted when any service domain's state changes. Carries a full state
        snapshot (not delta) wrapped in a `{domain, state}` envelope.

        This is the sole push mechanism for service domain state. Per-service
        discrete broadcast events (e.g., `spotify:status`, `gameclock:status`,
        `video:status`, `bluetooth:device`, etc.) have been removed. All service
        state changes are delivered exclusively through this unified event.

        **Domains**: spotify, video, health, bluetooth, audio, lighting, sound, gameclock, cueengine
      payload:
        type: object
        required:
          - event
          - data
          - timestamp
        properties:
          event:
            type: string
            const: service:state
            description: Event name
          data:
            type: object
            required:
              - domain
              - state
            properties:
              domain:
                type: string
                enum: [spotify, video, health, bluetooth, audio, lighting, sound, gameclock, cueengine, held]
                description: Service domain identifier
                example: "spotify"
              state:
                type: object
                description: |
                  Full state snapshot for the domain. Shape varies by domain:
                  - **spotify**: `{connected, state, volume, track, pausedByGameClock}`
                  - **video**: `{status, currentVideo, queue[], queueLength, connected}`
                  - **health**: `{vlc: {status, message, lastChecked}, spotify: {...}, ...}` (all 8 services)
                  - **bluetooth**: `{scanning, pairedDevices[], connectedDevices[]}`
                  - **audio**: `{routes, defaultSink, ducking}`
                  - **lighting**: `{connected, activeScene, scenes[]}`
                  - **sound**: `{playing[]}`
                  - **gameclock**: `{status, elapsed, startTime, totalPausedMs}`
                  - **cueengine**: `{cues[], activeCues[], disabledCues[]}`
                  - **held**: `{items[]}`
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T19:00:30.200Z"

    # ============================================================================
    # CUE ENGINE (3 events: fired, completed, error)
    # ============================================================================

    CueFired:
      name: cue:fired
      title: Cue Fired Event
      summary: Broadcast when a cue is fired
      description: |
        Broadcast when a cue sequence is triggered and begins execution.

        **Phase 1 Feature**: Cue engine automates game actions (sound, lighting, video) based on triggers.

        **Triggers**:
        - Manual: GM fires cue via gm:command (source: 'gm')
        - Automatic: Event-based trigger (e.g., transaction:accepted, source: 'cue')
      payload:
        type: object
        required:
          - event
          - data
          - timestamp
        properties:
          event:
            type: string
            const: cue:fired
            description: Event name
          data:
            type: object
            required:
              - cueId
              - trigger
              - source
            properties:
              cueId:
                type: string
                description: Unique cue identifier
                example: "business-sale"
              trigger:
                type: string
                description: What triggered this cue
                example: "event:transaction:accepted"
              source:
                type: string
                description: Source of the trigger
                enum:
                  - gm
                  - cue
                example: "cue"
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T20:10:00.000Z"

    CueCompleted:
      name: cue:completed
      title: Cue Completed Event
      summary: Broadcast when a cue completes execution
      description: |
        Broadcast when a cue finishes executing all commands. Includes per-command
        tracking so the GM knows which commands succeeded and which failed.

        **Note**: This is a terminal state - the cue will not execute further unless re-fired.
      payload:
        type: object
        required:
          - event
          - data
          - timestamp
        properties:
          event:
            type: string
            const: cue:completed
            description: Event name
          data:
            type: object
            required:
              - cueId
              - completedCommands
              - failedCommands
            properties:
              cueId:
                type: string
                description: Unique cue identifier
                example: "first-scan-fanfare"
              completedCommands:
                type: array
                description: Commands that executed successfully
                items:
                  type: object
                  required:
                    - action
                  properties:
                    action:
                      type: string
                      description: The command action that succeeded
                      example: "sound:play"
                    position:
                      type: number
                      description: Timeline position in seconds (compound cues only)
                      example: 0
              failedCommands:
                type: array
                description: Commands that failed during execution
                items:
                  type: object
                  required:
                    - action
                    - error
                  properties:
                    action:
                      type: string
                      description: The command action that failed
                      example: "lighting:scene:activate"
                    error:
                      type: string
                      description: Error message from the failed command
                      example: "Lighting service not connected"
                    position:
                      type: number
                      description: Timeline position in seconds (compound cues only)
                      example: 5
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T19:05:00.000Z"

    CueError:
      name: cue:error
      title: Cue Error Event
      summary: Broadcast when a cue action fails
      description: |
        Broadcast when a cue encounters an error during action execution.

        **Error Handling**: Cue engine continues to next action after error (fail-fast per action, not per cue).

        **Common Errors**:
        - pw-play not found (PipeWire command missing)
        - File not found (audio/video asset missing)
        - Home Assistant unreachable (lighting service unavailable)
      payload:
        type: object
        required:
          - event
          - data
          - timestamp
        properties:
          event:
            type: string
            const: cue:error
            description: Event name
          data:
            type: object
            required:
              - cueId
              - action
              - position
              - error
            properties:
              cueId:
                type: string
                description: Unique cue identifier
                example: "business-sale"
              action:
                type: string
                description: Action that failed
                example: "sound:play"
              position:
                type: integer
                nullable: true
                description: Action position in cue sequence (null if not applicable)
                example: null
              error:
                type: string
                description: Error message
                example: "pw-play not found"
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T20:12:00.000Z"


                  - video:queue:clear
                  - display:idle-loop
                  - display:scoreboard
                  - display:status
                  - score:adjust
                  - score:reset
                  - transaction:delete
                  - transaction:create
                  - system:reset
                  - bluetooth:scan:start
                  - bluetooth:scan:stop
                  - bluetooth:pair
                  - bluetooth:unpair
                  - bluetooth:connect
                  - bluetooth:disconnect
                  - audio:route:set
                  - audio:volume:set
                  - lighting:scene:activate
                  - lighting:scenes:refresh
                  - cue:fire
                  - cue:stop
                  - cue:pause
                  - cue:resume
                  - cue:enable
                  - cue:disable
                  - held:release
                  - held:discard
                  - held:release-all
                  - held:discard-all
                  - sound:play
                  - sound:stop
                  - spotify:play
                  - spotify:pause
                  - spotify:stop
                  - spotify:next
                  - spotify:previous
                  - spotify:volume
                  - spotify:playlist
                  - spotify:cache:verify
                  - service:check
                example: "video:skip"
              payload:
                type: object
                description: Action-specific parameters
                example: {}
          timestamp:
            type: string
            format: date-time
            description: Event timestamp
            example: "2025-10-15T20:20:00.000Z"
      examples:
        - name: Session Create
          payload:
            event: gm:command
            data:
              action: session:create
              payload:
                name: "About Last Night - Oct 15 2025"
                teams: ["Team Alpha", "Detectives", "Blue Squad"]

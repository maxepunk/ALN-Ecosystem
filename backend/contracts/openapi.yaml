openapi: 3.1.0

info:
  title: ALN Orchestrator API
  version: 1.0.0
  description: |
    About Last Night (ALN) Orchestrator backend API for memory token scanning system.

    **Architecture**: Contract-First approach with minimal complexity for live-event tool.

    **Components**:
    - Player Scanner: HTTP-only, fire-and-forget (ESP32 compatible)
    - GM Scanner: WebSocket-driven real-time game logic
    - Admin Panel: Monitoring and intervention via WebSocket

    **Key Constraints**:
    - ONE session at a time (2-hour live event)
    - Standalone mode support (scanners work without orchestrator)
    - Minimal architectural complexity (not enterprise SaaS)

    **Documentation References**:
    - Alignment Decisions: docs/api-alignment/04-alignment-decisions.md
    - Functional Requirements: docs/api-alignment/08-functional-requirements.md
    - Test Architecture: docs/api-alignment/06-test-architecture.md

servers:
  - url: http://localhost:3000
    description: Local development
  - url: http://{orchestrator-ip}:3000
    description: Network deployment
    variables:
      orchestrator-ip:
        default: "10.0.0.100"
        description: Orchestrator IP address on local network

tags:
  - name: Authentication
    description: Admin authentication and JWT token management
  - name: Player Scanner
    description: Token scanning operations (HTTP-only, fire-and-forget)
  - name: Static Resources
    description: Token data, health checks, system status
  - name: Session Management
    description: Session lifecycle (query only - commands via WebSocket)
  - name: Admin Operations
    description: System administration (logs, monitoring)

paths:
  /api/admin/auth:
    post:
      tags:
        - Authentication
      summary: Authenticate as admin
      description: |
        Validate admin password and issue JWT token for WebSocket authentication.

        **Functional Requirement**: Section 1.1 (Auth & Authorization)
        **Decisions Applied**:
        - #3 (RESTful HTTP - direct response, HTTP codes)
        - #12 (Contracts location)

        **Flow**:
        1. Admin Panel sends password
        2. Backend validates password
        3. Returns JWT token (24-hour expiry)
        4. Token used for WebSocket connection authentication

        **WebSocket Authentication**:
        Client includes JWT token in Socket.io `handshake.auth` object when connecting.
        Server validates token via middleware during connection handshake (before connection accepted).

        Authentication succeeds:
          - Connection established
          - Device registered in session
          - `device:connected` broadcast to other clients
          - `sync:full` event auto-sent to newly connected client

        Authentication fails:
          - Connection rejected immediately
          - Client receives Socket.io `connect_error` event
          - Error code: AUTH_REQUIRED, INVALID_TOKEN, or TOKEN_EXPIRED

        **Handshake.auth Structure**:
        ```javascript
        {
          token: "JWT_TOKEN",           // Required: JWT from this endpoint
          deviceId: "DEVICE_ID",        // Required: Unique device identifier
          deviceType: "gm" | "admin",   // Required: Device type
          version: "1.0.0"              // Optional: Client version
        }
        ```

        **Security**:
        - Password validation via environment variable
        - JWT tokens for stateless WebSocket authentication
        - Token validation during Socket.io handshake (connection-time)
        - Tokens tracked for active sessions (revocable via logout)
        - Failed authentication blocks connection establishment
      operationId: authenticateAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  description: Admin password
                  example: "admin-secret-123"
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                  - expiresIn
                properties:
                  token:
                    type: string
                    description: JWT Bearer token
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYWRtaW4iLCJpYXQiOjE3MzAzNTAwMDAsImV4cCI6MTczMDQzNjQwMH0.signature"
                  expiresIn:
                    type: integer
                    description: Token expiration time in seconds
                    example: 86400
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "AUTH_REQUIRED"
                message: "Authentication failed"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "VALIDATION_ERROR"
                message: "Password is required"

  /api/tokens:
    get:
      tags:
        - Static Resources
      summary: Get token database
      description: |
        Fetch complete token database (tokens.json from ALN-TokenData submodule).

        **Functional Requirement**: Section 1.9 (Static Resource Serving)
        **Decisions Applied**: #3 (RESTful HTTP)

        **Usage**:
        - Player Scanner: Fetches on app load for standalone mode
        - GM Scanner: Fetches for token metadata (memoryType, valueRating, group)
        - Standalone Mode: Scanners bundle tokens.json for offline operation

        **Token Metadata Includes**:
        - SF_RFID (token ID)
        - SF_ValueRating (1-5, scoring weight)
        - SF_MemoryType ("Technical", "Business", "Personal", "Mention", "Party")
        - SF_Group (group completion bonuses)
        - Media paths (image, audio, video)
      operationId: getTokens
      responses:
        '200':
          description: Token database
          content:
            application/json:
              schema:
                type: object
                required:
                  - tokens
                  - count
                  - lastUpdate
                properties:
                  tokens:
                    type: object
                    description: Map of token ID to token data
                    additionalProperties:
                      $ref: '#/components/schemas/Token'
                  count:
                    type: integer
                    description: Total number of tokens
                    example: 42
                  lastUpdate:
                    type: string
                    format: date-time
                    description: Last update timestamp
                    example: "2025-09-30T12:00:00.000Z"
              example:
                tokens:
                  "534e2b02":
                    image: "assets/images/534e2b02.jpg"
                    audio: "assets/audio/534e2b02.mp3"
                    video: null
                    processingImage: null
                    SF_RFID: "534e2b02"
                    SF_ValueRating: 3
                    SF_MemoryType: "Technical"
                    SF_Group: ""
                  "534e2b03":
                    image: null
                    audio: null
                    video: "test_30sec.mp4"
                    processingImage: "534e2b03.jpg"
                    SF_RFID: "534e2b03"
                    SF_ValueRating: 3
                    SF_MemoryType: "Technical"
                    SF_Group: ""
                  "tac001":
                    image: "assets/images/tac001.jpg"
                    audio: "assets/audio/tac001.wav"
                    video: null
                    processingImage: null
                    SF_RFID: "tac001"
                    SF_ValueRating: 1
                    SF_MemoryType: "Personal"
                    SF_Group: ""
                count: 3
                lastUpdate: "2025-09-30T12:00:00.000Z"

  /api/assets/manifest:
    get:
      tags:
        - Static Resources
      summary: Get asset sync manifest
      description: |
        Return the canonical asset manifest describing every image and audio
        file currently shipped with the token database. Used by the ESP32 CYD
        scanner at boot to determine which files to download from
        `/api/assets/images/...` and `/api/assets/audio/...`.

        Entries are keyed by tokenId. `sha1` lets the device skip unchanged
        files across boots; `size` is an integrity check during streaming
        downloads; `ext` (audio only) records the actual filename extension
        since audio files may be `.wav` or `.mp3`.

        Generated by `scripts/sync_notion_to_tokens.py` at asset-write time and
        written to `aln-memory-scanner/assets/manifest.json`. Backend caches
        it in memory and re-reads when the file mtime changes.
      operationId: getAssetManifest
      responses:
        '200':
          description: Current asset manifest
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - images
                  - audio
                properties:
                  version:
                    type: string
                    format: date-time
                    description: Manifest generation timestamp (ISO 8601, UTC)
                    example: "2026-04-17T12:34:56Z"
                  images:
                    type: object
                    description: Map of tokenId to image metadata
                    additionalProperties:
                      type: object
                      required: [sha1, size]
                      properties:
                        sha1:
                          type: string
                          pattern: '^[0-9a-f]{40}$'
                          description: SHA-1 of the BMP file bytes
                        size:
                          type: integer
                          minimum: 0
                          description: File size in bytes
                  audio:
                    type: object
                    description: Map of tokenId to audio metadata
                    additionalProperties:
                      type: object
                      required: [sha1, size, ext]
                      properties:
                        sha1:
                          type: string
                          pattern: '^[0-9a-f]{40}$'
                        size:
                          type: integer
                          minimum: 0
                        ext:
                          type: string
                          enum: [wav, mp3]
                          description: Actual filename extension on disk
              example:
                version: "2026-04-17T12:34:56Z"
                images:
                  kaa001:
                    sha1: "da39a3ee5e6b4b0d3255bfef95601890afd80709"
                    size: 230454
                audio:
                  asm031:
                    sha1: "3b18e512dba79e4c8300dd08aeb37f8e728b8dad"
                    size: 125000
                    ext: "wav"
        '404':
          description: Manifest file missing (asset sync not yet run)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/assets/images/{tokenId}.bmp:
    get:
      tags:
        - Static Resources
      summary: Get token image (BMP)
      description: |
        Serve an individual BMP for the given tokenId from
        `aln-memory-scanner/assets/images/`. Used by the ESP32 CYD scanner
        during its wireless asset sync (see `/api/assets/manifest`).

        `tokenId` is validated against `^[a-z0-9_]+$` to reject path
        traversal. Response includes `ETag` and `Last-Modified` headers so
        clients may perform conditional GETs (`If-None-Match`,
        `If-Modified-Since`) for cheap no-op checks.
      operationId: getAssetImage
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9_]+$'
          description: Sanitized token ID (alphanumeric + underscore)
      responses:
        '200':
          description: Image bytes
          headers:
            ETag:
              schema: { type: string }
            Last-Modified:
              schema: { type: string }
          content:
            image/bmp:
              schema:
                type: string
                format: binary
        '304':
          description: Not modified (conditional request)
        '400':
          description: Invalid tokenId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/assets/audio/{tokenId}.{ext}:
    get:
      tags:
        - Static Resources
      summary: Get token audio
      description: |
        Serve an individual audio file for the given tokenId from
        `aln-memory-scanner/assets/audio/`. Same validation and caching
        semantics as the image endpoint. Extension is restricted to the
        formats currently produced by the Notion sync (`wav`, `mp3`).
      operationId: getAssetAudio
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9_]+$'
        - name: ext
          in: path
          required: true
          schema:
            type: string
            enum: [wav, mp3]
      responses:
        '200':
          description: Audio bytes
          headers:
            ETag:
              schema: { type: string }
            Last-Modified:
              schema: { type: string }
          content:
            audio/wav:
              schema: { type: string, format: binary }
            audio/mpeg:
              schema: { type: string, format: binary }
        '304':
          description: Not modified
        '400':
          description: Invalid tokenId or extension
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Audio not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/pack/manifest:
    get:
      tags:
        - Game Pack
      summary: Get the active game pack manifest
      description: |
        Return `pack-manifest.json` for the ACTIVE pack directory (the
        `PACK_PATH` env override, else the ALN-TokenData submodule). This is
        the pack channel's entry point (Phase 3 A2): clients fetch the
        manifest network-first, compare `contentHash` against their cached
        pack, and perform a staged atomic refresh via
        `/api/pack/files/{filePath}` when it differs — see
        `docs/plans/2026-07-09-phase3-1-standalone-pack-loading.md` §2-§3.

        The manifest format is governed by
        `ALN-TokenData/pack-manifest.schema.json` (A1) and machine-maintained
        by `backend/scripts/build-pack-manifest.js`; this contract pins only
        the fields the pack channel depends on (`additionalProperties` stays
        open for the schema-governed remainder, e.g. `hardware`).
      operationId: getPackManifest
      responses:
        '200':
          description: The active pack's manifest
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - kind
                  - schemaVersion
                  - packId
                  - version
                  - contentHash
                  - engine
                  - files
                properties:
                  kind:
                    type: string
                    const: pack-manifest
                  schemaVersion:
                    type: integer
                    example: 1
                  packId:
                    type: string
                    example: "about-last-night"
                  version:
                    type: string
                    description: Pack version (semver; draft+publish bumps it)
                    example: "1.0.0"
                  contentHash:
                    type: string
                    pattern: '^sha256:[0-9a-f]{64}$'
                    description: |
                      sha256 over the sorted `path:sha1` lines of the file
                      inventory — the pack identity clients compare for
                      staleness (deterministic; regenerated by
                      build-pack-manifest.js).
                  engine:
                    type: object
                    required: [minVersion]
                    properties:
                      minVersion:
                        type: string
                        example: "3.0.0"
                  files:
                    type: array
                    description: Full file inventory (the /api/pack/files whitelist)
                    items:
                      type: object
                      required: [path, role, sha1, size]
                      properties:
                        path:
                          type: string
                          description: Pack-relative path (no leading slash)
                          example: "tokens.json"
                        role:
                          type: string
                          enum: [game, tokens, strings, theme, cues, template, asset-image, asset-audio, asset-video, other]
                        sha1:
                          type: string
                          pattern: '^[0-9a-f]{40}$'
                        size:
                          type: integer
                          minimum: 0
        '404':
          description: No pack manifest in the active pack directory (pre-pack checkout)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/pack/files/{filePath}:
    get:
      tags:
        - Game Pack
      summary: Get a file from the active game pack
      description: |
        Serve a single file from the ACTIVE pack directory by its
        manifest-relative path. `filePath` may contain `/` separators (e.g.
        `assets/images/kaa001.bmp`).

        **Whitelist semantics**: only paths present in the active manifest's
        `files[]` inventory are served — anything else (including traversal
        attempts and files that exist on disk but are not inventoried) is a
        404. Clients verify each downloaded file against the manifest `sha1`
        during staged refresh, so responses need no integrity headers.
      operationId: getPackFile
      parameters:
        - name: filePath
          in: path
          required: true
          description: Manifest-relative pack file path (may contain slashes)
          schema:
            type: string
            example: "game.json"
      responses:
        '200':
          description: The pack file's bytes
          content:
            application/json:
              schema: {}
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Path not in the active manifest inventory (or no manifest)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      tags:
        - Static Resources
      summary: Health check
      description: |
        Basic health check endpoint for connection validation.

        **Functional Requirement**: Section 1.9 (Static Resource Serving)
        **Decisions Applied**: #3 (RESTful HTTP)

        **Usage**:
        - Player Scanner: Check if orchestrator available
        - GM Scanner: Connection health monitoring
        - Network discovery: Validate orchestrator IP
      operationId: healthCheck
      responses:
        '200':
          description: Service is online
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - version
                  - uptime
                  - timestamp
                  - pack
                properties:
                  status:
                    type: string
                    enum: [online]
                    description: Service status
                    example: "online"
                  pack:
                    description: |
                      The server's ACTIVE game pack identity (A2 staleness
                      visibility — the F-TOOL-05 killer). Clients compare
                      their loaded pack `contentHash` against this; C1
                      preflight fails on mismatch. `null` when the active
                      pack directory has no pack-manifest.json (pre-pack
                      checkout).
                    nullable: true
                    type: object
                    required: [packId, version, contentHash]
                    properties:
                      packId:
                        type: string
                        example: "about-last-night"
                      version:
                        type: string
                        example: "1.0.0"
                      contentHash:
                        type: string
                        pattern: '^sha256:[0-9a-f]{64}$'
                  version:
                    type: string
                    description: Orchestrator version
                    example: "1.0.0"
                  uptime:
                    type: number
                    description: Process uptime in seconds
                    example: 3600.5
                  timestamp:
                    type: string
                    format: date-time
                    description: Current server timestamp
                    example: "2025-09-30T12:00:00.000Z"
                  timezone:
                    type: string
                    description: |
                      POSIX TZ string for this deployment. Used by ESP32 scanners
                      (and any other client without local timezone config) to
                      render scan timestamps in the deployment's local time.
                      Defaults to "UTC0" when APP_TIMEZONE_POSIX is unset.
                    example: "PST8PDT,M3.2.0,M11.1.0"

  /api/scan:
    post:
      tags:
        - Player Scanner
      summary: Player Scanner token scan (fire-and-forget)
      description: |
        Single token scan from Player Scanner. Logs scan and triggers video playback if token has video.

        **Functional Requirement**: Section 2.1 (Player Token Scanning)
        **Decisions Applied**:
        - #3 (RESTful HTTP - direct response, HTTP codes)
        - #4 (deviceId field naming)
        - #9 (Fire-and-forget pattern)

        **CRITICAL - Fire-and-Forget Pattern**:
        Player Scanner **IGNORES response body** by design (ESP32 compatibility).
        Response provided for:
        - Debugging/logging
        - Future non-ESP32 clients
        - API consistency

        **Video Trigger Decision**:
        Player Scanner determines video playback **CLIENT-SIDE** from local tokens.json.
        Backend queues video if token has video property, but scanner doesn't parse response.

        **Game Mechanics**:
        - NO SCORING - This is NOT a game transaction
        - NO TEAM COMMITMENT - Teams chosen at GM Scanner
        - teamId field OPTIONAL (players haven't committed yet)
        - Used for: Scan logging, video triggering only

        **Flow**:
        1. Player scans token with shared Player Scanner device (4-5 players per scanner)
        2. Scanner sends scan to orchestrator (if connected)
        3. Backend logs scan, queues video if token.video exists
        4. Scanner displays local media (image/audio) from bundled assets
        5. Scanner ignores response (client-side decisions)

        **Breaking Changes**:
        - Field: scannerId → deviceId (Decision #4)
      operationId: playerScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tokenId
                - deviceId
                - deviceType
              properties:
                tokenId:
                  type: string
                  description: Token ID (RFID identifier). Database lookup validates existence.
                  minLength: 1
                  maxLength: 100
                  example: "534e2b03"
                teamId:
                  type: string
                  description: |
                    Team ID (OPTIONAL - players haven't committed to team yet).
                    Used for logging only, NOT game logic.
                    Team commitment happens at GM Scanner.
                  example: "Team Alpha"
                deviceId:
                  type: string
                  description: Player Scanner device identifier
                  minLength: 1
                  maxLength: 100
                  example: "PLAYER_SCANNER_01"
                deviceType:
                  type: string
                  enum: [player, esp32]
                  description: |
                    Device type for duplicate detection behavior (Phase 3 P0.1).
                    - player: Web-based player scanner (allows duplicate scans for content re-viewing)
                    - esp32: Hardware ESP32 scanner (allows duplicate scans for content re-viewing)
                  example: "player"
                timestamp:
                  type: string
                  format: date-time
                  description: Scan timestamp (ISO8601)
                  example: "2025-09-30T14:30:00.000Z"
      responses:
        '200':
          description: Scan accepted, video queued (if applicable)
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - tokenId
                  - videoQueued
                properties:
                  status:
                    type: string
                    enum: [accepted]
                    description: Scan status
                  message:
                    type: string
                    description: User-friendly message
                    example: "Video queued for playback"
                  tokenId:
                    type: string
                    description: Token ID that was scanned
                    example: "534e2b03"
                  mediaAssets:
                    type: object
                    description: Token media assets (for future clients)
                    properties:
                      video:
                        type: string
                        nullable: true
                        example: "test_30sec.mp4"
                      image:
                        type: string
                        nullable: true
                        example: "assets/images/534e2b03.jpg"
                      audio:
                        type: string
                        nullable: true
                        example: null
                  videoQueued:
                    type: boolean
                    description: Whether video was queued
                    example: true
              example:
                status: "accepted"
                message: "Video queued for playback"
                tokenId: "534e2b03"
                mediaAssets:
                  video: "test_30sec.mp4"
                  image: null
                  audio: null
                videoQueued: true
        '409':
          description: |
            Conflict — TWO distinct cases (F-SCAN-12). Clients MUST
            distinguish them; they have opposite persistence semantics:

            1. **No session** (`error: SESSION_NOT_FOUND`): the scan was
               NOT recorded. Decision A5: 4xx responses are FINAL — do not
               requeue; rescan once a session exists.
            2. **Video rejected** (`status: rejected`): the scan WAS
               persisted to the session; only the video trigger was
               rejected (VLC down or a video is already playing).
               `waitTime` is present only for the video-busy case.
          content:
            application/json:
              schema:
                oneOf:
                  - title: NoSession
                    type: object
                    required:
                      - error
                      - message
                    properties:
                      error:
                        type: string
                        enum: [SESSION_NOT_FOUND]
                      message:
                        type: string
                        example: "No active session - admin must create session first"
                  - title: VideoRejected
                    type: object
                    required:
                      - status
                      - message
                      - tokenId
                      - videoQueued
                    properties:
                      status:
                        type: string
                        enum: [rejected]
                      message:
                        type: string
                        example: "Video already playing, please wait"
                      tokenId:
                        type: string
                        example: "534e2b03"
                      mediaAssets:
                        type: object
                      videoQueued:
                        type: boolean
                        enum: [false]
                        description: Always false — the video was rejected
                      waitTime:
                        type: integer
                        description: |
                          Estimated wait time in seconds. Present ONLY when
                          a video is already playing (video_busy); omitted
                          when VLC is down (vlc_down).
                        example: 30
        '404':
          description: Token not found in token database (scan not recorded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "TOKEN_NOT_FOUND"
                message: "Token NO_SUCH_TOKEN not recognized"
        '400':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: Server still initializing (token data not loaded yet)
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                  - message
                properties:
                  error:
                    type: string
                    enum: [SERVICE_UNAVAILABLE]
                  message:
                    type: string
                    example: "Server is still initializing, please retry"

  /api/scan/batch:
    post:
      tags:
        - Player Scanner
      summary: Player Scanner offline queue batch upload
      description: |
        Process multiple scan requests from Player Scanner offline queue.

        **Functional Requirement**:
        - Section 1.8 (Offline Queue Management)
        - Section 2.3 (Connection Management)

        **Decisions Applied**:
        - #3 (RESTful HTTP)
        - #4 (deviceId field naming)

        **Usage**:
        When Player Scanner reconnects after offline period, uploads queued scans in batch.
        Orchestrator processes each scan (logging only).

        **Game Mechanics**:
        - NO SCORING - This is NOT a game transaction
        - Scans logged for audit trail
        - Videos are NEVER queued for batch-replayed scans (decision A4,
          2026-06-09): batches represent past activity. If video playback was
          unavailable at scan time the player was alerted then; replay must
          not start playback at upload time. `videoQueued` is always false
          in batch results.

        **Per-Item Validation (F-SCAN-14)**:
        Each entry is validated against the same schema as POST /api/scan
        (tokenId, deviceId, deviceType required; timestamp ISO8601, normalized
        to UTC). Invalid entries are returned as `status: failed` results —
        the rest of the batch still processes — and are NOT persisted to the
        session. Entries with pre-sync timestamps (before 2020-01-01, e.g.
        ESP32 scans stamped 1970+uptime before NTP sync) are likewise rejected
        as failed: epoch-era scan times would corrupt session timelines and
        post-session analysis.

        **Breaking Changes**:
        - Field: scannerId → deviceId (Decision #4)
      operationId: playerScanBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batchId
                - transactions
              properties:
                batchId:
                  type: string
                  description: Unique batch identifier for idempotency (Phase 1.2 P0.2)
                  example: "a3f4b2c1-5678-90ab-cdef-1234567890ab"
                transactions:
                  type: array
                  description: Array of queued scan requests
                  items:
                    type: object
                    required:
                      - tokenId
                      - deviceId
                      - deviceType
                    properties:
                      tokenId:
                        type: string
                        description: Token ID
                        example: "534e2b02"
                      teamId:
                        type: string
                        description: Team ID (optional, for logging)
                        example: "Team Alpha"
                      deviceId:
                        type: string
                        description: Player Scanner device ID
                        example: "PLAYER_SCANNER_01"
                      deviceType:
                        type: string
                        enum: [player, esp32]
                        description: Device type for duplicate detection behavior (Phase 3 P0.1)
                        example: "player"
                      timestamp:
                        type: string
                        format: date-time
                        description: Original scan timestamp
                        example: "2025-09-30T14:25:00.000Z"
            example:
              batchId: "a3f4b2c1-5678-90ab-cdef-1234567890ab"
              transactions:
                - tokenId: "534e2b02"
                  teamId: "Team Alpha"
                  deviceId: "PLAYER_SCANNER_01"
                  deviceType: "player"
                  timestamp: "2025-09-30T14:25:00.000Z"
                - tokenId: "tac001"
                  deviceId: "PLAYER_SCANNER_01"
                  deviceType: "player"
                  timestamp: "2025-09-30T14:26:30.000Z"
                - tokenId: "534e2b03"
                  teamId: "Detectives"
                  deviceId: "PLAYER_SCANNER_01"
                  deviceType: "player"
                  timestamp: "2025-09-30T14:27:15.000Z"
      responses:
        '200':
          description: Batch processed
          content:
            application/json:
              schema:
                type: object
                required:
                  - batchId
                  - processedCount
                  - totalCount
                  - failedCount
                  - results
                properties:
                  batchId:
                    type: string
                    description: Batch identifier from request (Phase 1.2 P0.2)
                    example: "a3f4b2c1-5678-90ab-cdef-1234567890ab"
                  processedCount:
                    type: integer
                    description: Number of successfully processed transactions
                    example: 2
                  totalCount:
                    type: integer
                    description: Total number of transactions in batch
                    example: 3
                  failedCount:
                    type: integer
                    description: Number of failed transactions
                    example: 1
                  results:
                    type: array
                    description: Per-scan results
                    items:
                      type: object
                      required:
                        - tokenId
                        - status
                        - videoQueued
                      properties:
                        tokenId:
                          type: string
                          nullable: true
                          description: |
                            Token ID echoed from the entry (null when the
                            entry was malformed and had no tokenId).
                          example: "534e2b02"
                        status:
                          type: string
                          enum: [processed, failed]
                          example: "processed"
                        videoQueued:
                          type: boolean
                          description: |
                            Always false — batch-replayed scans never trigger
                            video playback (decision A4).
                          example: false
                        message:
                          type: string
                          description: Optional informational message
                          example: null
                        error:
                          type: string
                          description: |
                            Error message if status=failed (unknown token,
                            per-item schema validation failure, or pre-sync
                            1970-era timestamp — F-SCAN-14).
                          example: null
              example:
                batchId: "a3f4b2c1-5678-90ab-cdef-1234567890ab"
                processedCount: 3
                totalCount: 3
                failedCount: 0
                results:
                  - tokenId: "534e2b02"
                    status: "processed"
                    videoQueued: false
                  - tokenId: "tac001"
                    status: "processed"
                    videoQueued: false
                  - tokenId: "534e2b03"
                    status: "processed"
                    videoQueued: false
        '400':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: Server still initializing (token data not loaded yet)
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                  - message
                properties:
                  error:
                    type: string
                    enum: [SERVICE_UNAVAILABLE]
                  message:
                    type: string
                    example: "Server is still initializing, please retry"

  /api/session:
    get:
      tags:
        - Session Management
      summary: Get current active session
      description: |
        Get current active session information (one-time fetch).

        **Functional Requirement**: Section 1.2 (Session Management) - ONE session at a time
        **Decisions Applied**:
        - #3 (RESTful HTTP - direct response, HTTP codes)
        - #4 (id field within resource, not sessionId)
        - #7 (full session resource structure)

        **CRITICAL - ONE Session at a Time**:
        This system supports ONLY ONE active session (2-hour live event model).
        Multi-session endpoints (GET /api/session/:id, GET /api/admin/sessions) ELIMINATED.

        **Usage**:
        - GM Scanner: One-time fetch on connection (before WebSocket established)
        - Debug/Recovery: Check current session state via HTTP
        - Primary State: Comes via WebSocket sync:full event (not HTTP polling)

        **Session Commands**:
        Session lifecycle commands (create/pause/resume/end) handled via WebSocket gm:command event, NOT HTTP POST endpoints.

        **Breaking Changes**:
        - Field: sessionId → id (Decision #4 - use 'id' within resource)
        - Added: teams array (target state, not currently implemented)
        - Structure: Full resource matches session:update WebSocket event (Decision #7)
      operationId: getCurrentSession
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
              example:
                id: "2a2f9d45-5d2d-441d-b32c-52c939f3c103"
                name: "About Last Night - Oct 15 2025"
                startTime: "2025-10-15T19:00:00.000Z"
                endTime: null
                status: "active"
                teams: ["Team Alpha", "Detectives", "Blue Squad"]
                metadata:
                  gmStations: 2
                  playerDevices: 3
                  totalScans: 47
                  uniqueTokensScanned: ["534e2b02", "534e2b03", "tac001", "fli001", "hos001"]
        '404':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "SESSION_NOT_FOUND"
                message: "No active session"

  /api/state:
    get:
      tags:
        - Static Resources
      summary: Get current game state (debug/recovery)
      description: |
        Get complete current game state for debugging or recovery (one-time fetch).

        **Functional Requirement**: Section 1.7 (State Synchronization) - debugging utility
        **Decisions Applied**:
        - #3 (RESTful HTTP)
        - #5 (video:status structure - used in videoStatus field)

        **CRITICAL - NOT for Polling**:
        This endpoint is for DEBUGGING and RECOVERY only.
        Real-time state synchronization provided by WebSocket sync:full event.

        Investigation finding: No polling pattern detected (correct usage).

        **ETag Caching**:
        Supports HTTP ETag for efficient caching (304 Not Modified response).
        Client sends If-None-Match header with previous ETag.

        **State Structure**:
        Complete snapshot including:
        - Current session (if exists)
        - All team scores
        - Recent transactions (last 100)
        - Video playback status (matches video:status WebSocket event per Decision #5)
        - Connected devices
        - System health (orchestrator + VLC)

        **Usage**:
        - Debug: Manual state inspection during development
        - Recovery: Fetch state after disconnect/reconnect
        - Admin Panel: Initial state load before WebSocket connection
      operationId: getCurrentState
      parameters:
        - in: header
          name: If-None-Match
          schema:
            type: string
          description: ETag from previous response for caching
          example: '"d41d8cd98f00b204e9800998ecf8427e"'
      responses:
        '200':
          description: Current game state
          headers:
            ETag:
              schema:
                type: string
              description: Entity tag for caching
              example: '"d41d8cd98f00b204e9800998ecf8427e"'
            Cache-Control:
              schema:
                type: string
              description: Cache control header
              example: "no-cache, must-revalidate"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'
              example:
                session:
                  id: "2a2f9d45-5d2d-441d-b32c-52c939f3c103"
                  name: "About Last Night - Oct 15 2025"
                  startTime: "2025-10-15T19:00:00.000Z"
                  endTime: null
                  status: "active"
                  teams: ["Team Alpha", "Detectives", "Blue Squad"]
                  metadata:
                    gmStations: 2
                    playerDevices: 3
                    totalScans: 47
                scores:
                  - teamId: "Team Alpha"
                    currentScore: 11500
                    baseScore: 11000
                    bonusPoints: 500
                    tokensScanned: 8
                    completedGroups: ["jaw_group"]
                    lastUpdate: "2025-10-15T20:15:30.000Z"
                  - teamId: "Detectives"
                    currentScore: 9200
                    baseScore: 9200
                    bonusPoints: 0
                    tokensScanned: 6
                    completedGroups: []
                    lastUpdate: "2025-10-15T20:14:15.000Z"
                recentTransactions:
                  - id: "7b8b1d85-b234-4be9-bde5-4c8522a1f15e"
                    tokenId: "534e2b03"
                    teamId: "Team Alpha"
                    deviceId: "GM_Station_1"
                    mode: "blackmarket"
                    points: 3000
                    timestamp: "2025-10-15T20:15:30.000Z"
                    memoryType: "Technical"
                    valueRating: 3
                    group: "jaw_group"
                  - id: "419d5341-25e9-4ef4-a0a5-9c3a3ec19b2a"
                    tokenId: "tac001"
                    teamId: "Detectives"
                    deviceId: "GM_Station_2"
                    mode: "detective"
                    points: 100
                    timestamp: "2025-10-15T20:14:15.000Z"
                    memoryType: "Personal"
                    valueRating: 1
                    group: ""
                videoStatus:
                  status: "playing"
                  queueLength: 2
                  currentVideo:
                    tokenId: "534e2b03"
                    filename: "534e2b03.mp4"
                    position: 0.42
                    duration: 30
                  queue: []
                  connected: true
                devices:
                  - deviceId: "GM_Station_1"
                    type: "gm"
                    name: "GM Station v1.0.0"
                    connectionTime: "2025-10-15T19:00:30.000Z"
                    ipAddress: "10.0.0.81"
                  - deviceId: "PLAYER_SCANNER_01"
                    type: "player"
                    name: "Player Scanner 1"
                    connectionTime: "2025-10-15T19:02:00.000Z"
                    ipAddress: "10.0.0.82"
                serviceHealth:
                  vlc:
                    status: "healthy"
                    message: "Connected to VLC"
                    lastChecked: "2025-10-15T19:00:30.000Z"
                  music:
                    status: "healthy"
                    message: "MPD connected"
                    lastChecked: "2025-10-15T19:00:30.000Z"
        '304':
          description: Not Modified (ETag match)
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/admin/logs:
    get:
      tags:
        - Admin Operations
      summary: Get system logs
      description: |
        Fetch recent system logs for troubleshooting during live event.

        **Functional Requirement**: Section 1.10.2 (System Administration - Logging)
        **Decisions Applied**: #3 (RESTful HTTP)

        **Usage**:
        - Admin Panel: Troubleshooting during live event
        - One-time fetch (NOT streaming)
        - Default: Error logs only

        **CRITICAL - Not Streaming**:
        Logs are fetched via HTTP GET for simplicity, NOT real-time streaming via WebSocket.
        This is intentional for admin convenience during troubleshooting.

        **Query Parameters**:
        - lines: Number of log lines (default 100, max 500)
        - level: Log level filter (default 'error')

        **Security**:
        Requires JWT authentication (Bearer token from POST /api/admin/auth)
      operationId: getSystemLogs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: lines
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Number of log lines to return
          example: 100
        - in: query
          name: level
          schema:
            type: string
            enum: [error, warn, info]
            default: error
          description: Log level filter
          example: "error"
      responses:
        '200':
          description: System logs
          content:
            application/json:
              schema:
                type: object
                required:
                  - logs
                  - count
                  - timestamp
                properties:
                  logs:
                    type: array
                    items:
                      type: string
                    description: Array of log lines
                    example:
                      - "2025-10-15T20:15:30.123Z [ERROR] VLC connection lost"
                      - "2025-10-15T20:14:22.456Z [ERROR] Transaction validation failed: invalid token"
                      - "2025-10-15T20:12:15.789Z [ERROR] WebSocket client disconnected unexpectedly"
                  count:
                    type: integer
                    description: Number of log lines returned
                    example: 3
                  timestamp:
                    type: string
                    format: date-time
                    description: Request timestamp
                    example: "2025-10-15T20:16:00.000Z"
              example:
                logs:
                  - "2025-10-15T20:15:30.123Z [ERROR] VLC connection lost"
                  - "2025-10-15T20:14:22.456Z [ERROR] Transaction validation failed: invalid token"
                  - "2025-10-15T20:12:15.789Z [ERROR] WebSocket client disconnected unexpectedly"
                count: 3
                timestamp: "2025-10-15T20:16:00.000Z"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "AUTH_REQUIRED"
                message: "Authentication token required"
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "PERMISSION_DENIED"
                message: "Admin access required"
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/music/tracks:
    get:
      tags:
        - Music
      summary: List all music tracks available to MPD
      description: |
        Returns the full catalog of MP3 tracks known to MPD's database.
        The set is derived from `backend/public/music/` at MPD startup.

        Used by the Config Tool playlist editor to populate the "Available Tracks"
        list for drag-and-drop authoring.
      operationId: listMusicTracks
      responses:
        '200':
          description: Track catalog
          content:
            application/json:
              schema:
                type: object
                required:
                  - tracks
                properties:
                  tracks:
                    type: array
                    items:
                      type: object
                      required:
                        - file
                        - title
                        - artist
                        - album
                        - duration
                      properties:
                        file:
                          type: string
                          description: Filename relative to MPD music_directory
                          example: "001 - OGRE_-_Negotiation_s_Over.mp3"
                        title:
                          type: string
                          example: "Negotiation's Over"
                        artist:
                          type: string
                          example: "OGRE"
                        album:
                          type: string
                          example: ""
                        duration:
                          type: integer
                          description: Track duration in seconds
                          example: 184
        '500':
          description: Server error querying MPD
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
        '503':
          description: Music service not connected
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /api/music/playlists:
    get:
      tags:
        - Music
      summary: Get all music playlists
      description: |
        Returns the contents of `backend/config/music-playlists.json` verbatim.
        Used by the GM Scanner (via sync:full) and the Config Tool editor.
      operationId: listMusicPlaylists
      responses:
        '200':
          description: Playlist set
          content:
            application/json:
              schema:
                type: object
                required:
                  - playlists
                properties:
                  playlists:
                    type: array
                    items:
                      $ref: '#/components/schemas/MusicPlaylist'
        '500':
          description: Server error reading playlist file
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
        '503':
          description: Playlist file not configured
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

    put:
      tags:
        - Music
      summary: Replace all music playlists
      description: |
        Atomically replaces `backend/config/music-playlists.json` with the
        supplied payload. The write is `.tmp + rename` so readers always see a
        valid file. musicService's fs.watch picks up the rename and emits
        'playlists:reloaded' → service:state push to GM clients.

        Body MUST be `{playlists: [...]}`. Each playlist requires id, name,
        shuffle, loop, crossfadeMs (0-5000), tracks (string array). Duplicate
        ids are rejected.
      operationId: replaceMusicPlaylists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playlists
              properties:
                playlists:
                  type: array
                  items:
                    $ref: '#/components/schemas/MusicPlaylist'
      responses:
        '200':
          description: Playlists saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
        '500':
          description: Server error writing playlist file
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
        '503':
          description: Playlist file not configured
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

components:
  schemas:
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          enum:
            - AUTH_REQUIRED
            - PERMISSION_DENIED
            - VALIDATION_ERROR
            - SESSION_NOT_FOUND
            - TOKEN_NOT_FOUND
            - DUPLICATE_TRANSACTION
            - INVALID_REQUEST
            # Generic resource 404 (responseBuilder.notFound + the app-level
            # 404 handler) — long-standing wire reality, first pinned by the
            # pack-channel 404 contract tests (A2).
            - NOT_FOUND
        message:
          type: string
          description: User-friendly error message
        details:
          type: array
          description: Optional error details
          items:
            type: object

    Token:
      type: object
      required:
        - SF_RFID
        - SF_Group
      properties:
        image:
          type: string
          nullable: true
          description: Relative path to image asset
          example: "assets/images/534e2b02.jpg"
        audio:
          type: string
          nullable: true
          description: Relative path to audio asset
          example: "assets/audio/534e2b02.mp3"
        video:
          type: string
          nullable: true
          description: Video filename (from backend/public/videos/)
          example: "test_30sec.mp4"
        processingImage:
          type: string
          nullable: true
          description: Processing screen image
          example: "534e2b03.jpg"
        SF_RFID:
          type: string
          description: Token ID (RFID identifier)
          example: "534e2b02"
        SF_ValueRating:
          type:
            - integer
            - "null"
          minimum: 1
          maximum: 5
          description: Scoring weight (1=lowest, 5=highest value). Null for tokens with no Black Market score.
          example: 3
        SF_MemoryType:
          type:
            - string
            - "null"
          description: Memory category (scoring multiplier varies by type). Null for tokens with no Black Market score.
          example: "Technical"
        SF_Group:
          type: string
          description: Group ID for completion bonuses (empty string if no group)
          example: ""

    Session:
      type: object
      required:
        - id
        - name
        - startTime
        - status
        - teams
        - metadata
      properties:
        id:
          type: string
          format: uuid
          description: Session ID (UUID v4, per Decision 4 - use 'id' within resource)
          example: "2a2f9d45-5d2d-441d-b32c-52c939f3c103"
        name:
          type: string
          description: Event name
          minLength: 1
          maxLength: 100
          example: "About Last Night - Oct 15 2025"
        startTime:
          type: string
          format: date-time
          description: Session start time (ISO8601)
          example: "2025-10-15T19:00:00.000Z"
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Session end time (null if active)
          example: null
        status:
          type: string
          enum: [setup, active, paused, ended]
          description: Session status
          example: "active"
        teams:
          type: array
          items:
            type: string
            description: Team ID
          description: Array of team IDs participating in session
          example: ["Team Alpha", "Detectives", "Blue Squad"]
        metadata:
          type: object
          description: Session metadata (statistics, device counts)
          properties:
            gmStations:
              type: integer
              description: Number of GM stations connected
              example: 2
            playerDevices:
              type: integer
              description: Number of player scanners connected
              example: 3
            totalScans:
              type: integer
              description: Total scans across all teams
              example: 47
            uniqueTokensScanned:
              type: array
              items:
                type: string
              description: List of unique token IDs scanned
              example: ["534e2b02", "534e2b03", "tac001", "fli001", "hos001"]
            pack:
              description: |
                The pack this session was created under (A2 — a session's
                rules are frozen at start; the stamp is the mechanism).
                Null for legacy sessions and pre-pack checkouts. On restore,
                the backend loud-warns when this differs from the active
                pack's contentHash.
              nullable: true
              type: object
              required:
                - packId
                - version
                - contentHash
              properties:
                packId:
                  type: string
                  example: "about-last-night"
                version:
                  type: string
                  example: "1.0.0"
                contentHash:
                  type: string
                  pattern: '^sha256:[0-9a-f]{64}$'

    GameState:
      type: object
      required:
        - session
        - scores
        - recentTransactions
        - videoStatus
        - devices
        - serviceHealth
      properties:
        session:
          oneOf:
            - $ref: '#/components/schemas/Session'
            - type: 'null'
          description: Current active session (null if no session)
        scores:
          type: array
          description: Team scores array
          items:
            type: object
            required:
              - teamId
              - currentScore
              - baseScore
              - bonusPoints
              - tokensScanned
              - completedGroups
              - lastUpdate
            properties:
              teamId:
                type: string
                description: Team ID
                example: "Team Alpha"
              currentScore:
                type: integer
                description: Total score (base + bonus)
                example: 11500
              baseScore:
                type: integer
                description: Base score from token values
                example: 11000
              bonusPoints:
                type: integer
                description: Bonus points from group completions
                example: 500
              tokensScanned:
                type: integer
                description: Number of tokens scanned by team
                example: 8
              completedGroups:
                type: array
                items:
                  type: string
                description: Array of completed group IDs
                example: ["jaw_group"]
              lastUpdate:
                type: string
                format: date-time
                description: Last score update timestamp
                example: "2025-10-15T20:15:30.000Z"
        recentTransactions:
          type: array
          description: Recent transactions (last 100)
          items:
            type: object
            required:
              - id
              - tokenId
              - teamId
              - deviceId
              - mode
              - points
              - timestamp
            properties:
              id:
                type: string
                format: uuid
                description: Transaction ID
                example: "7b8b1d85-b234-4be9-bde5-4c8522a1f15e"
              tokenId:
                type: string
                description: Token ID (per Decision 4)
                example: "534e2b03"
              teamId:
                type: string
                description: Team ID
                example: "Team Alpha"
              deviceId:
                type: string
                description: GM Scanner device ID (per Decision 4)
                example: "GM_Station_1"
              mode:
                type: string
                description: >-
                  Game mode id. Not a closed enum (Phase 3 slice 1, open mode
                  vocabulary): valid values are the ACTIVE pack's declared
                  modes (game.json modes[].id), enforced at runtime by the
                  server's wire validation. ALN wire values remain
                  "blackmarket" and "detective" through Phase 3 (R12).
                example: "blackmarket"
              points:
                type: integer
                description: Points awarded (0 if duplicate/error)
                example: 3000
              timestamp:
                type: string
                format: date-time
                description: Transaction timestamp
                example: "2025-10-15T20:15:30.000Z"
              memoryType:
                type: string
                description: Token memory type (Personal, Business, Technical, Mention, Party, or UNKNOWN)
                example: "Technical"
              valueRating:
                type: integer
                minimum: 1
                maximum: 5
                description: Token value rating (from tokens.json)
                example: 3
              group:
                type: string
                description: Token group (from tokens.json, empty string if no group)
                example: "jaw_group"
        videoStatus:
          type: object
          description: |
            Current video playback state. Mirrors videoQueueService.getState()
            shape — same as the `service:state` event for domain `video`.
          required:
            - status
            - queueLength
            - currentVideo
            - queue
            - connected
          properties:
            status:
              type: string
              enum: [idle, loading, playing, paused, completed, error]
              description: Current playback state
            currentVideo:
              oneOf:
                - type: object
                  properties:
                    tokenId:
                      type: string
                    filename:
                      type: string
                    position:
                      type: number
                      description: Playback position as ratio 0.0-1.0
                    duration:
                      type: number
                      description: Video duration in seconds
                - type: 'null'
              description: Current video metadata (null when no video playing)
            queue:
              type: array
              items:
                type: object
                properties:
                  tokenId:
                    type: string
                  filename:
                    type: string
            queueLength:
              type: integer
              description: Number of pending items in queue
            connected:
              type: boolean
              description: Whether VLC is reachable via D-Bus
        devices:
          type: array
          description: Connected devices
          items:
            type: object
            required:
              - deviceId
              - type
              - name
              - connectionTime
            properties:
              deviceId:
                type: string
                description: Device identifier (per Decision 4)
                example: "GM_Station_1"
              type:
                type: string
                enum: [gm, player]
                description: Device type
                example: "gm"
              name:
                type: string
                description: Friendly device name
                example: "GM Station v1.0.0"
              connectionTime:
                type: string
                format: date-time
                description: Connection timestamp
                example: "2025-10-15T19:00:30.000Z"
              connectionStatus:
                type: string
                enum: [connected, disconnected, reconnecting]
                description: Device connection status (used for station auto-numbering)
                example: "connected"
              ipAddress:
                type: string
                description: Device IP address
                example: "10.0.0.81"
        serviceHealth:
          type: object
          description: Health snapshot for all registered services from serviceHealthRegistry
          additionalProperties:
            type: object
            required:
              - status
              - message
            properties:
              status:
                type: string
                enum: [healthy, down]
              message:
                type: string
              lastChecked:
                type: string
                format: date-time
                nullable: true
          example:
            vlc:
              status: "healthy"
              message: "Connected to VLC"
              lastChecked: "2025-10-15T19:00:30.000Z"
            music:
              status: "healthy"
              message: "MPD connected"
              lastChecked: "2025-10-15T19:00:30.000Z"
        playerScans:
          type: array
          description: Player scanner scan records persisted to session (Phase 1). Included in sync:full for Game Activity tracking.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              tokenId:
                type: string
              deviceId:
                type: string
              deviceType:
                type: string
              timestamp:
                type: string
                format: date-time
              tokenData:
                type: object
                nullable: true
        environment:
          type: object
          description: Venue environment state snapshot (Phase 0). Contains bluetooth, audio routing, and lighting sub-objects.
          properties:
            bluetooth:
              type: object
              description: Bluetooth speaker state (paired devices, scan status)
            audio:
              type: object
              description: Audio routing state (per-stream routes, available sinks, ducking, persisted volumes)
            lighting:
              type: object
              description: Lighting state (Home Assistant connection, available scenes)
        gameClock:
          type: object
          description: Game clock state (Phase 1). Tracks elapsed time for the 2-hour session.
          properties:
            status:
              type: string
              enum: [running, paused, stopped]
              description: Current game clock state
            elapsed:
              type: integer
              description: Elapsed time in seconds
            expectedDuration:
              type: integer
              description: Expected session duration in seconds (default 7200)
        cueEngine:
          type: object
          description: Cue engine state (Phase 1-2). Contains loaded cues, active compound cues, and disabled standing cues.
          properties:
            loaded:
              type: boolean
              description: Whether cues have been loaded
            cues:
              type: array
              description: Summary of all loaded cues
              items:
                type: object
            activeCues:
              type: array
              description: Currently executing compound cues
              items:
                type: object
            disabledCues:
              type: array
              description: Disabled standing cue IDs
              items:
                type: string
        heldItems:
          type: array
          description: Items held due to service outage or resource contention (Phase 4). Combines held cues and held videos.
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique held item identifier
              type:
                type: string
                enum: [cue, video]
              reason:
                type: string
                description: Why the item was held (service_down, video_busy, vlc_down)
              status:
                type: string
                description: Current status (always 'held' in state snapshot)

    MusicPlaylist:
      type: object
      description: A named playlist of MP3 tracks for the music service.
      required:
        - id
        - name
        - shuffle
        - loop
        - crossfadeMs
        - tracks
      properties:
        id:
          type: string
          description: Stable kebab-case identifier
          example: "all-tracks"
        name:
          type: string
          description: Human-readable display name
          example: "All Tracks"
        description:
          type: string
          description: Optional notes for the GM
        shuffle:
          type: boolean
          description: Whether the queue is shuffled when loaded
        loop:
          type: boolean
          description: Whether MPD repeats the queue when the last track ends
        crossfadeMs:
          type: integer
          minimum: 0
          maximum: 5000
          description: Crossfade duration in ms (MPD rounds to seconds)
        tracks:
          type: array
          items:
            type: string
          description: Track filenames relative to MPD music_directory

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "VALIDATION_ERROR"
            message: "Validation failed: tokenId, deviceId"
            details:
              - field: "tokenId"
                message: "tokenId is required"
              - field: "deviceId"
                message: "deviceId is required"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from POST /api/admin/auth

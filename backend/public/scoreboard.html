<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-cast-sdk" content="enabled">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Case File: About Last Night</title>

    <!-- Google Fonts - Distinctive Typography Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@600;700;800;900&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES - "CLASSIFIED EVIDENCE TERMINAL"
           Color palette: surveillance-era investigation aesthetic
           ============================================ */
        :root {
            /* Core Palette */
            --void-black: #0a0908;
            --paper-cream: #f5f0e6;
            --paper-shadow: #d4cfc4;
            --paper-dark: #ebe6dc;
            --evidence-red: #c41e3a;
            --evidence-red-dark: #8b0000;
            --terminal-green: #00ff41;
            --terminal-amber: #ffb000;
            --ink-black: #1a1a1a;
            --redaction-black: #0d0d0d;

            /* Typography */
            --font-display: 'Playfair Display', Georgia, serif;
            --font-typewriter: 'Special Elite', 'Courier New', monospace;
            --font-body: 'Libre Baskerville', Georgia, serif;
            --font-mono: 'IBM Plex Mono', 'Consolas', monospace;

            /* Layout */
            --header-height: 80px;
            --ticker-height: 120px;
            --content-padding: 2rem;
            --card-gap: 1.5rem;

            /* Animation Timings */
            --load-vignette: 0ms;
            --load-scanlines: 200ms;
            --load-header: 400ms;
            --load-content: 800ms;
            --load-ticker: 2000ms;
        }

        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--void-black);
            color: var(--paper-cream);
            position: relative;
        }

        /* ============================================
           ATMOSPHERIC OVERLAYS
           Film grain, vignette, scan lines
           ============================================ */

        /* Film Grain Overlay - SVG noise texture */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9000;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Vignette Effect - surveillance camera aesthetic */
        .vignette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8999;
            background: radial-gradient(
                ellipse at center,
                transparent 40%,
                rgba(0, 0, 0, 0.3) 70%,
                rgba(0, 0, 0, 0.6) 100%
            );
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: var(--load-vignette);
        }

        /* Scan Lines - CRT monitor effect */
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8998;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            animation-delay: var(--load-scanlines);
        }

        /* Scan Line Sweep Animation - periodic effect */
        .scanline-overlay::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(
                180deg,
                transparent 0%,
                rgba(255, 255, 255, 0.02) 50%,
                transparent 100%
            );
            animation: scanlineSweep 8s linear infinite;
            animation-delay: 3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scanlineSweep {
            0% { top: -50%; }
            100% { top: 150%; }
        }

        /* ============================================
           MAIN LAYOUT STRUCTURE
           Header | Content (Evidence Pages) | Ticker
           ============================================ */
        .evidence-board {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* ============================================
           HEADER - "Case File Header"
           ============================================ */
        .case-header {
            height: var(--header-height);
            background: linear-gradient(180deg, var(--ink-black) 0%, var(--void-black) 100%);
            border-bottom: 2px solid var(--evidence-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--content-padding);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            position: relative;
            z-index: 100;
            opacity: 0;
            animation: slideDown 0.6s ease-out forwards;
            animation-delay: var(--load-header);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .case-title {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            color: var(--paper-cream);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .case-title::before {
            content: '';
            display: inline-block;
            width: 1.5em;
            height: 1.5em;
            background: var(--evidence-red);
            clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 2rem;
            font-size: clamp(0.75rem, 1.5vw, 1rem);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--terminal-green);
            box-shadow: 0 0 10px var(--terminal-green);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.offline .status-dot {
            background: var(--evidence-red);
            box-shadow: 0 0 10px var(--evidence-red);
            animation: none;
        }

        .status-indicator.connecting .status-dot {
            background: var(--terminal-amber);
            box-shadow: 0 0 10px var(--terminal-amber);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .rec-indicator {
            color: var(--evidence-red);
            font-weight: 700;
            animation: recBlink 1.5s step-end infinite;
        }

        @keyframes recBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .timestamp {
            color: var(--terminal-green);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.1em;
        }

        .timestamp .colon {
            opacity: 1;
        }

        /* Countdown visual states */
        .countdown--running .colon {
            animation: colonBlink 1s step-end infinite;
        }

        .countdown--paused {
            animation: fullBlink 1s step-end infinite;
        }

        .countdown--overtime {
            color: var(--evidence-red) !important;
            animation: fullBlink 0.5s step-end infinite;
        }

        @keyframes colonBlink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes fullBlink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        /* ============================================
           MAIN CONTENT AREA
           Character-grouped evidence pages
           ============================================ */
        .evidence-content {
            height: calc(100vh - var(--header-height) - var(--ticker-height));
            overflow: hidden;
            position: relative;
            padding: var(--content-padding);
        }

        /* ============================================
           CHARACTER GROUP CARDS - "Pinned Documents"
           ============================================ */
        .character-group {
            background:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='0.03'/%3E%3C/svg%3E"),
                linear-gradient(to bottom, var(--paper-cream) 0%, var(--paper-dark) 100%);
            border-left: 4px solid var(--evidence-red);
            padding: 1.2rem 1.5rem;
            margin-bottom: var(--card-gap);
            position: relative;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.3);
        }

        /* Pushpin decoration */
        .character-group::before {
            content: '';
            position: absolute;
            top: 12px;
            left: -12px;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #dc3545 0%, var(--evidence-red-dark) 100%);
            border-radius: 50%;
            box-shadow: inset -2px -2px 3px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.3);
        }

        .character-group__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid var(--paper-shadow);
            padding-bottom: 0.5rem;
        }

        .character-group__name {
            font-family: var(--font-typewriter);
            font-size: clamp(1rem, 2vw, 1.4rem);
            text-transform: uppercase;
            color: var(--ink-black);
            letter-spacing: 0.05em;
        }

        .character-group__pips {
            display: flex;
            gap: 4px;
        }

        .pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--evidence-red-dark);
            transition: background-color 500ms ease;
        }

        .pip--filled {
            background-color: var(--evidence-red);
        }

        .character-group__entry {
            font-family: var(--font-body);
            font-size: clamp(0.85rem, 1.5vw, 1.05rem);
            color: var(--ink-black);
            line-height: 1.5;
            margin-bottom: 0.6rem;
            padding-left: 0.5rem;
        }

        .character-group__entry::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--evidence-red);
            border-radius: 50%;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .character-group__timestamp {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: #666;
            margin-right: 0.5rem;
        }

        /* Page dots */
        .page-dots {
            position: absolute;
            bottom: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 6px;
        }

        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 300ms;
        }

        .page-dot--active {
            background: var(--terminal-green);
        }

        /* Evidence arrival animation */
        .character-group--new {
            animation: evidenceDrop 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes evidenceDrop {
            0% { opacity: 0; transform: translateY(-30px) rotate(-1deg); }
            60% { transform: translateY(5px) rotate(0.5deg); }
            100% { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        /* Page transition */
        .evidence-page--transitioning {
            animation: pageCut 400ms ease;
        }

        @keyframes pageCut {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Empty evidence state */
        .evidence-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: var(--font-mono);
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Screen flash for new evidence */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            pointer-events: none;
            z-index: 9500;
            opacity: 0;
        }

        .flash-overlay.active {
            animation: screenFlash 0.4s ease-out;
        }

        @keyframes screenFlash {
            0% { opacity: 0; }
            10% { opacity: 0.3; }
            100% { opacity: 0; }
        }

        /* ============================================
           SCORE TICKER - "Scrolling Marquee"
           ============================================ */
        .score-ticker {
            height: var(--ticker-height);
            background: linear-gradient(180deg, rgba(10,9,8,0.95), rgba(10,9,8,0.98));
            border-top: 2px solid var(--evidence-red-dark);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 100;
            opacity: 0;
            animation: tickerSlideUp 0.6s ease-out forwards;
            animation-delay: var(--load-ticker);
        }

        @keyframes tickerSlideUp {
            from {
                opacity: 0;
                transform: translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score-ticker.hidden {
            display: none;
        }

        .ticker-track {
            width: 100%;
            overflow: hidden;
        }

        .ticker-content {
            display: flex;
            align-items: center;
            white-space: nowrap;
            animation: tickerScroll var(--ticker-duration, 30s) linear infinite;
        }

        .ticker-content.paused {
            animation-play-state: paused;
        }

        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-entry {
            display: inline-flex;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0 1.5rem;
            font-family: var(--font-mono);
            color: var(--terminal-green);
            transition: color 300ms;
        }

        .ticker-entry--flash {
            color: var(--terminal-amber);
        }

        .ticker-entry__rank {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 700;
            opacity: 0.7;
        }

        .ticker-entry__name {
            font-size: clamp(1.25rem, 2.5vw, 2rem);
            font-weight: 600;
            font-family: var(--font-typewriter);
            color: var(--paper-cream);
        }

        .ticker-entry__score {
            font-size: clamp(1.25rem, 2.5vw, 2rem);
            font-weight: 700;
        }

        .ticker-separator {
            color: var(--evidence-red);
            font-size: 1.5rem;
            padding: 0 0.5rem;
            opacity: 0.5;
        }

        .ticker-empty {
            font-family: var(--font-mono);
            color: rgba(255,255,255,0.3);
            font-size: 1.2rem;
            padding: 0 2rem;
        }

        /* ============================================
           DISPLAY MODE OVERLAY
           Shown when VLC is playing video
           ============================================ */
        .display-mode-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .display-mode-overlay.active {
            display: flex;
        }

        .display-mode-overlay-text {
            color: rgba(255, 255, 255, 0.3);
            font-family: var(--font-mono);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        /* ============================================
           KIOSK MODE OVERRIDES
           Activated via ?kiosk=true URL parameter
           ============================================ */
        body.kiosk-mode {
            cursor: none;
        }

        body.kiosk-mode ::-webkit-scrollbar {
            display: none;
        }

        body.kiosk-mode .case-header .status-indicator:first-child {
            display: none;
        }

        /* Detective mode - hide score ticker */
        body.mode-detective .score-ticker {
            display: none;
        }

        body.mode-detective .evidence-content {
            height: calc(100vh - var(--header-height));
            padding-bottom: var(--content-padding);
        }

        /* ============================================
           LOADING STATE
           ============================================ */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--terminal-green);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            z-index: 200;
        }

        .loading-indicator.hidden {
            display: none;
        }

        .loading-indicator::after {
            content: '';
            animation: loadingDots 1.5s infinite;
        }

        @keyframes loadingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .hidden { display: none !important; }
        .invisible { visibility: hidden; }
    </style>
</head>
<body>
    <!-- Atmospheric Overlays -->
    <div class="grain-overlay"></div>
    <div class="vignette-overlay"></div>
    <div class="scanline-overlay"></div>
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- Main Evidence Board -->
    <div class="evidence-board">
        <!-- Case File Header -->
        <header class="case-header">
            <div class="case-title">
                <span>CASE FILE: ABOUT LAST NIGHT</span>
            </div>
            <div class="header-status">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span id="statusText">CONNECTING</span>
                </div>
                <span class="rec-indicator">REC</span>
                <span class="timestamp" id="timestamp">
                    <span class="hours">--</span><span class="colon">:</span><span class="minutes">--</span><span class="colon">:</span><span class="seconds">--</span>
                </span>
            </div>
        </header>

        <!-- Evidence Content Area -->
        <main class="evidence-content" id="evidenceContent">
            <div class="evidence-page" id="evidencePage"></div>
            <div class="page-dots" id="pageDots"></div>
        </main>

        <!-- Score Ticker -->
        <footer class="score-ticker" id="scoreTicker">
            <div class="ticker-track" id="tickerTrack">
                <div class="ticker-content" id="tickerContent">
                    <span class="ticker-empty">No scores recorded</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Display Mode Overlay -->
    <div class="display-mode-overlay" id="displayModeOverlay">
        <span class="display-mode-overlay-text">Video Playing...</span>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-indicator" id="loadingIndicator">
        INITIALIZING
    </div>

    <!-- Socket.io Client Library -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script>
        // ============================================
        // DEVICE ID GENERATION
        // ============================================
        function generateDeviceId() {
            const baseId = 'SCOREBOARD_DISPLAY';
            const urlParams = new URLSearchParams(window.location.search);

            // Allow explicit override via URL param
            const explicitId = urlParams.get('deviceId');
            if (explicitId) {
                return explicitId;
            }

            // For kiosk mode, use the base ID (primary HDMI display)
            if (urlParams.get('kiosk') === 'true') {
                return baseId;
            }

            // For networked browsers, generate unique suffix
            let storedId = sessionStorage.getItem('scoreboard_device_id');
            if (storedId) {
                return storedId;
            }

            const uniqueId = `${baseId}_${Date.now().toString(36).toUpperCase()}`;
            sessionStorage.setItem('scoreboard_device_id', uniqueId);
            return uniqueId;
        }

        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            adminPassword: '@LN-c0nn3ct',
            deviceId: generateDeviceId(),
            apiUrl: window.location.origin,
            reconnectDelay: 2000,
            tokenRefreshInterval: 23 * 60 * 60 * 1000,
        };

        // ============================================
        // STATE (Task 8: New state model)
        // ============================================
        const state = {
            socket: null,
            token: null,
            isConnected: false,
            sessionId: null,                  // Track current session for boundary detection
            teamScores: new Map(),            // teamId -> score object
            evidenceByOwner: new Map(),       // owner -> {entries: [], lastExposed: Date}
            ownerTotalTokens: new Map(),      // owner -> total token count (from /api/tokens)
            pages: [],                        // Array of arrays of owner names per page
            currentPage: 0,                   // Current page index
            pageCycleTimer: null,             // setInterval ID for page cycling
            displayMode: 'SCOREBOARD',
            kioskMode: false,
            countdown: {                      // Game countdown state
                status: 'stopped',            // stopped | running | paused
                elapsed: 0,                   // Seconds elapsed (from server)
                expectedDuration: 7200,       // Seconds total (from server)
                tickInterval: null,           // setInterval ID for client-side tick
                lastSyncTime: null,           // Date.now() of last server sync
            },
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const elements = {
            connectionStatus: document.getElementById('connectionStatus'),
            statusText: document.getElementById('statusText'),
            evidenceContent: document.getElementById('evidenceContent'),
            evidencePage: document.getElementById('evidencePage'),
            pageDots: document.getElementById('pageDots'),
            scoreTicker: document.getElementById('scoreTicker'),
            tickerTrack: document.getElementById('tickerTrack'),
            tickerContent: document.getElementById('tickerContent'),
            flashOverlay: document.getElementById('flashOverlay'),
            displayModeOverlay: document.getElementById('displayModeOverlay'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            timestamp: document.getElementById('timestamp'),
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getRandomRotation() {
            const rotations = [-1.5, -1, -0.5, 0.5, 1, 1.5];
            return rotations[Math.floor(Math.random() * rotations.length)];
        }

        // ============================================
        // COUNTDOWN TIMER (Task 13 - replaces wall clock)
        // ============================================
        function formatCountdown(remainingSeconds) {
            if (remainingSeconds <= 0) return { hours: '00', minutes: '00', seconds: '00' };
            const h = String(Math.floor(remainingSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((remainingSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(Math.floor(remainingSeconds % 60)).padStart(2, '0');
            return { hours: h, minutes: m, seconds: s };
        }

        function renderCountdown() {
            const cd = state.countdown;

            if (cd.status === 'stopped') {
                elements.timestamp.querySelector('.hours').textContent = '--';
                elements.timestamp.querySelector('.minutes').textContent = '--';
                elements.timestamp.querySelector('.seconds').textContent = '--';
                elements.timestamp.classList.remove('countdown--running', 'countdown--paused', 'countdown--overtime');
                return;
            }

            // Calculate current elapsed (server elapsed + client drift since last sync)
            let currentElapsed = cd.elapsed;
            if (cd.status === 'running' && cd.lastSyncTime) {
                const drift = (Date.now() - cd.lastSyncTime) / 1000;
                currentElapsed = cd.elapsed + drift;
            }

            const remaining = Math.max(0, cd.expectedDuration - currentElapsed);
            const { hours, minutes, seconds } = formatCountdown(remaining);

            elements.timestamp.querySelector('.hours').textContent = hours;
            elements.timestamp.querySelector('.minutes').textContent = minutes;
            elements.timestamp.querySelector('.seconds').textContent = seconds;

            // Visual states
            elements.timestamp.classList.remove('countdown--running', 'countdown--paused', 'countdown--overtime');
            if (remaining <= 0) {
                elements.timestamp.classList.add('countdown--overtime');
            } else if (cd.status === 'paused') {
                elements.timestamp.classList.add('countdown--paused');
            } else {
                elements.timestamp.classList.add('countdown--running');
            }
        }

        function syncCountdown(gameClock) {
            const cd = state.countdown;
            cd.status = gameClock.status || 'stopped';
            cd.elapsed = gameClock.elapsed || 0;
            cd.expectedDuration = gameClock.expectedDuration || 7200;
            cd.lastSyncTime = Date.now();

            if (cd.status === 'running') {
                startCountdownTick();
            } else {
                stopCountdownTick();
            }

            renderCountdown();
        }

        function startCountdownTick() {
            stopCountdownTick();
            state.countdown.tickInterval = setInterval(renderCountdown, 1000);
        }

        function stopCountdownTick() {
            if (state.countdown.tickInterval) {
                clearInterval(state.countdown.tickInterval);
                state.countdown.tickInterval = null;
            }
        }

        function stopCountdown() {
            stopCountdownTick();
            state.countdown.status = 'stopped';
            renderCountdown();
        }

        // Initial render (shows --:--:--)
        renderCountdown();

        // ============================================
        // MODE INITIALIZATION
        // ============================================
        function initModes() {
            const urlParams = new URLSearchParams(window.location.search);

            // Kiosk mode
            state.kioskMode = urlParams.get('kiosk') === 'true';
            if (state.kioskMode) {
                document.body.classList.add('kiosk-mode');
                console.log('[Scoreboard] Kiosk mode enabled');

                document.body.addEventListener('click', () => {
                    if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.warn('[Scoreboard] Fullscreen request denied:', err);
                        });
                    }
                }, { once: true });
            }

            // View mode (detective hides ticker)
            const modeParam = urlParams.get('mode');
            if (modeParam === 'detective') {
                document.body.classList.add('mode-detective');
                console.log('[Scoreboard] Detective mode - ticker hidden');
            }
        }

        // ============================================
        // DISPLAY MODE HANDLING
        // ============================================
        function handleDisplayMode(data) {
            const { mode } = data;
            state.displayMode = mode;
            const overlay = elements.displayModeOverlay;

            console.log('[Scoreboard] Display mode changed:', mode);

            switch (mode) {
                case 'IDLE_LOOP':
                case 'VIDEO':
                    if (state.kioskMode) {
                        overlay.classList.add('active');
                    }
                    break;
                case 'SCOREBOARD':
                    overlay.classList.remove('active');
                    break;
            }
        }

        // ============================================
        // CONNECTION STATUS
        // ============================================
        function updateConnectionStatus(status, text) {
            elements.connectionStatus.className = `status-indicator ${status}`;
            elements.statusText.textContent = text.toUpperCase();
        }

        // ============================================
        // EVIDENCE RENDERING (Task 10: Character-grouped)
        // ============================================
        function triggerFlash() {
            elements.flashOverlay.classList.add('active');
            setTimeout(() => {
                elements.flashOverlay.classList.remove('active');
            }, 400);
        }

        function renderEvidence() {
            // Sort character groups by most recent exposure
            const sortedOwners = [...state.evidenceByOwner.entries()]
                .sort((a, b) => (b[1].lastExposed || 0) - (a[1].lastExposed || 0));

            if (sortedOwners.length === 0) {
                elements.evidencePage.innerHTML = '<div class="evidence-empty">Awaiting evidence...</div>';
                elements.pageDots.innerHTML = '';
                stopPageCycling();
                return;
            }

            // Calculate pages based on available height
            state.pages = calculatePages(sortedOwners);

            // Clamp current page
            if (state.currentPage >= state.pages.length) {
                state.currentPage = 0;
            }

            // Render current page
            renderPage(state.currentPage);
            renderPageDots();
            startPageCycling();
        }

        function calculatePages(sortedOwners) {
            // Estimate available height
            const headerHeight = 80;   // var(--header-height)
            const tickerHeight = 120;  // var(--ticker-height)
            const padding = 64;        // 2rem * 2
            const availableHeight = window.innerHeight - headerHeight - tickerHeight - padding;

            const pages = [];
            let currentPageOwners = [];
            let currentHeight = 0;

            for (const [owner, group] of sortedOwners) {
                // Estimate group height: header (~50px) + entries (~40px each) + margins (~30px)
                const groupHeight = 50 + (group.entries.length * 40) + 30;

                if (currentHeight + groupHeight > availableHeight && currentPageOwners.length > 0) {
                    // Start new page
                    pages.push(currentPageOwners);
                    currentPageOwners = [];
                    currentHeight = 0;
                }

                currentPageOwners.push(owner);
                currentHeight += groupHeight;
            }

            if (currentPageOwners.length > 0) {
                pages.push(currentPageOwners);
            }

            return pages;
        }

        function renderPage(pageIndex) {
            if (!state.pages[pageIndex]) return;

            const owners = state.pages[pageIndex];
            const html = owners.map(owner => {
                const group = state.evidenceByOwner.get(owner);
                if (!group) return '';

                const totalTokens = state.ownerTotalTokens.get(owner) || 0;
                const exposedCount = group.entries.length;

                // Build pips
                const pipsHtml = totalTokens > 0
                    ? Array.from({ length: totalTokens }, (_, i) =>
                        `<span class="pip ${i < exposedCount ? 'pip--filled' : ''}"></span>`
                    ).join('')
                    : `<span class="pip pip--filled"></span>`.repeat(exposedCount);

                // Build entries (chronological)
                const entriesHtml = group.entries.map(entry => {
                    const time = new Date(entry.timestamp).toLocaleTimeString('en-US', {
                        hour: '2-digit', minute: '2-digit', hour12: false
                    });
                    return `<div class="character-group__entry">
                        <span class="character-group__timestamp">${time}</span>
                        ${escapeHtml(entry.summary)}
                    </div>`;
                }).join('');

                const rotation = getRandomRotation();
                return `<div class="character-group" style="transform: rotate(${rotation}deg)" data-owner="${escapeHtml(owner)}">
                    <div class="character-group__header">
                        <span class="character-group__name">${escapeHtml(owner)}</span>
                        <div class="character-group__pips">${pipsHtml}</div>
                    </div>
                    ${entriesHtml}
                </div>`;
            }).join('');

            elements.evidencePage.innerHTML = html;
        }

        function renderPageDots() {
            if (state.pages.length <= 1) {
                elements.pageDots.innerHTML = '';
                return;
            }
            elements.pageDots.innerHTML = state.pages.map((_, i) =>
                `<span class="page-dot ${i === state.currentPage ? 'page-dot--active' : ''}"></span>`
            ).join('');
        }

        function addEvidence(transaction) {
            if (transaction.mode !== 'detective') return;

            const owner = transaction.owner || 'Unknown';
            if (!state.evidenceByOwner.has(owner)) {
                state.evidenceByOwner.set(owner, { entries: [], lastExposed: null });
            }

            const group = state.evidenceByOwner.get(owner);
            const entryId = transaction.id || `${transaction.tokenId}-${transaction.teamId}-${Date.now()}`;

            // Duplicate check
            if (group.entries.some(e => e.id === entryId)) return;

            group.entries.push({
                id: entryId,
                tokenId: transaction.tokenId,
                timestamp: transaction.timestamp || new Date().toISOString(),
                summary: transaction.summary || transaction.tokenId,
            });
            group.lastExposed = new Date(transaction.timestamp || Date.now());

            // Flash effect
            triggerFlash();

            // Recalculate pages and jump to the page containing this character
            renderEvidence();

            // Find which page this owner is on and jump to it
            const targetPage = state.pages.findIndex(p => p.includes(owner));
            if (targetPage >= 0 && targetPage !== state.currentPage) {
                transitionToPage(targetPage);
            }
        }

        function removeEvidence(transactionId, tokenId, teamId) {
            let removed = false;
            for (const [owner, group] of state.evidenceByOwner) {
                const before = group.entries.length;
                group.entries = group.entries.filter(e => {
                    const matches = e.id === transactionId || e.tokenId === tokenId;
                    return !matches;
                });
                if (group.entries.length < before) removed = true;
                if (group.entries.length === 0) {
                    state.evidenceByOwner.delete(owner);
                }
            }
            if (removed) renderEvidence();
        }

        // ============================================
        // PAGE CYCLING (Task 11)
        // ============================================
        function startPageCycling() {
            stopPageCycling();
            if (state.pages.length <= 1) return;

            // Adaptive interval: 2-3 pages = 18s, 4+ = 12s
            const interval = state.pages.length <= 3 ? 18000 : 12000;

            state.pageCycleTimer = setInterval(() => {
                const nextPage = (state.currentPage + 1) % state.pages.length;
                transitionToPage(nextPage);
            }, interval);
        }

        function stopPageCycling() {
            if (state.pageCycleTimer) {
                clearInterval(state.pageCycleTimer);
                state.pageCycleTimer = null;
            }
        }

        function transitionToPage(pageIndex) {
            if (pageIndex === state.currentPage) return;

            // Fade-to-black transition
            elements.evidencePage.classList.add('evidence-page--transitioning');

            setTimeout(() => {
                state.currentPage = pageIndex;
                renderPage(pageIndex);
                renderPageDots();
            }, 200);  // Halfway through 400ms animation

            setTimeout(() => {
                elements.evidencePage.classList.remove('evidence-page--transitioning');
            }, 400);

            // Reset cycle timer so this page gets full display time
            startPageCycling();
        }

        // Recalculate pages on resize
        window.addEventListener('resize', () => {
            const sortedOwners = [...state.evidenceByOwner.entries()]
                .sort((a, b) => (b[1].lastExposed || 0) - (a[1].lastExposed || 0));
            if (sortedOwners.length > 0) {
                state.pages = calculatePages(sortedOwners);
                if (state.currentPage >= state.pages.length) {
                    state.currentPage = 0;
                }
                renderPage(state.currentPage);
                renderPageDots();
            }
        });

        // ============================================
        // SCORE TICKER RENDERING (Task 12)
        // ============================================
        function renderTicker() {
            const scores = Array.from(state.teamScores.values())
                .filter(team => team.currentScore > 0 || team.tokensScanned > 0 ||
                    (team.adminAdjustments && team.adminAdjustments.length > 0))
                .sort((a, b) => b.currentScore - a.currentScore);

            if (scores.length === 0) {
                elements.tickerContent.innerHTML = '<span class="ticker-empty">No scores recorded</span>';
                elements.tickerContent.style.removeProperty('--ticker-duration');
                return;
            }

            const buildEntries = (scores) => scores.map((team, index) => {
                const rank = index + 1;
                return `<span class="ticker-entry" data-team="${escapeHtml(team.teamId)}">
                    <span class="ticker-entry__rank">#${rank}</span>
                    <span class="ticker-entry__name">${escapeHtml(team.teamId)}</span>
                    <span class="ticker-entry__score">$${team.currentScore.toLocaleString()}</span>
                </span>
                <span class="ticker-separator">&bull;</span>`;
            }).join('');

            const entriesHtml = buildEntries(scores);

            if (scores.length <= 3) {
                // Few teams: no scroll, center content
                elements.tickerContent.innerHTML = entriesHtml;
                elements.tickerContent.classList.add('paused');
                elements.tickerContent.style.justifyContent = 'center';
            } else {
                // Duplicate content for seamless loop
                elements.tickerContent.innerHTML = entriesHtml + entriesHtml;
                elements.tickerContent.classList.remove('paused');
                elements.tickerContent.style.justifyContent = '';

                // Adaptive scroll duration based on content width
                const duration = Math.max(15, (scores.length * 300) / 80);
                elements.tickerContent.style.setProperty('--ticker-duration', `${duration}s`);
            }
        }

        function flashTickerEntry(teamId) {
            const entries = document.querySelectorAll(`.ticker-entry[data-team="${teamId}"]`);
            entries.forEach(entry => {
                entry.classList.add('ticker-entry--flash');
                setTimeout(() => entry.classList.remove('ticker-entry--flash'), 1500);
            });
        }

        function updateTeamScore(scoreData) {
            const existing = state.teamScores.get(scoreData.teamId);
            state.teamScores.set(scoreData.teamId, scoreData);

            renderTicker();

            if (existing && existing.currentScore !== scoreData.currentScore) {
                setTimeout(() => flashTickerEntry(scoreData.teamId), 100);
            }
        }

        // ============================================
        // SESSION BOUNDARY DETECTION (Task 9)
        // ============================================
        function handleSessionBoundary(newSessionId) {
            if (state.sessionId && state.sessionId !== newSessionId) {
                console.log('[Scoreboard] Session boundary detected:', state.sessionId, '->', newSessionId);
                // Clear all session-scoped data
                state.evidenceByOwner.clear();
                state.teamScores.clear();
                state.pages = [];
                state.currentPage = 0;
                stopPageCycling();
                stopCountdown();
            }
            state.sessionId = newSessionId;
        }

        // ============================================
        // TOKEN TOTALS FETCH (Task 8)
        // ============================================
        async function fetchTokenTotals() {
            try {
                const response = await fetch(`${CONFIG.apiUrl}/api/tokens`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const tokens = data.data?.tokens || data.tokens || {};

                state.ownerTotalTokens.clear();
                for (const [, token] of Object.entries(tokens)) {
                    const owner = token.owner;
                    if (owner) {
                        state.ownerTotalTokens.set(owner, (state.ownerTotalTokens.get(owner) || 0) + 1);
                    }
                }
                console.log('[Scoreboard] Token totals loaded:', state.ownerTotalTokens.size, 'characters');
            } catch (error) {
                console.error('[Scoreboard] Failed to fetch token totals:', error);
            }
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        async function authenticate() {
            try {
                const response = await fetch(`${CONFIG.apiUrl}/api/admin/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: CONFIG.adminPassword }),
                });

                if (!response.ok) {
                    throw new Error('Authentication failed');
                }

                const data = await response.json();
                state.token = data.token;

                console.log('[Scoreboard] Authentication successful');
                return true;
            } catch (error) {
                console.error('[Scoreboard] Authentication failed:', error);
                updateConnectionStatus('offline', 'AUTH FAILED');
                setTimeout(authenticate, CONFIG.reconnectDelay);
                return false;
            }
        }

        // ============================================
        // WEBSOCKET CONNECTION
        // ============================================
        function cleanupSocket() {
            if (state.socket) {
                console.log('[Scoreboard] Cleaning up socket');
                state.socket.removeAllListeners();
                if (state.socket.connected) {
                    state.socket.disconnect();
                }
                state.socket = null;
            }
            state.isConnected = false;
        }

        async function connectWebSocket() {
            if (!state.token) {
                console.error('[Scoreboard] No token available');
                return;
            }

            cleanupSocket();
            updateConnectionStatus('connecting', 'CONNECTING');

            try {
                state.socket = io(CONFIG.apiUrl, {
                    transports: ['websocket'],
                    auth: {
                        token: state.token,
                        deviceId: CONFIG.deviceId,
                        deviceType: 'gm',
                        version: '1.0.0',
                    },
                });

                setupSocketHandlers();
            } catch (error) {
                console.error('[Scoreboard] WebSocket connection failed:', error);
                updateConnectionStatus('offline', 'CONN FAILED');
                setTimeout(connectWebSocket, CONFIG.reconnectDelay);
            }
        }

        function setupSocketHandlers() {
            let lastActivityTime = Date.now();
            let zombieCheckInterval = null;

            state.socket.onAny(() => {
                lastActivityTime = Date.now();
            });

            state.socket.on('connect', () => {
                console.log('[Scoreboard] WebSocket connected');
                state.isConnected = true;
                updateConnectionStatus('connected', 'LIVE');
                elements.loadingIndicator.classList.add('hidden');

                state.socket.emit('sync:request');

                if (zombieCheckInterval) clearInterval(zombieCheckInterval);
                zombieCheckInterval = setInterval(() => {
                    const timeSinceActivity = Date.now() - lastActivityTime;
                    if (timeSinceActivity > 5 * 60 * 1000 && state.isConnected) {
                        console.warn('[Scoreboard] Zombie connection detected, reconnecting...');
                        clearInterval(zombieCheckInterval);
                        zombieCheckInterval = null;
                        cleanupSocket();
                        authenticate().then(authenticated => {
                            if (authenticated) connectWebSocket();
                        });
                    }
                }, 60 * 1000);
            });

            state.socket.on('disconnect', (reason) => {
                console.log('[Scoreboard] WebSocket disconnected:', reason);
                state.isConnected = false;
                updateConnectionStatus('offline', 'OFFLINE');

                if (zombieCheckInterval) {
                    clearInterval(zombieCheckInterval);
                    zombieCheckInterval = null;
                }
            });

            state.socket.on('connect_error', (error) => {
                console.error('[Scoreboard] Connection error:', error);
                updateConnectionStatus('offline', 'CONN ERROR');
            });

            state.socket.on('reconnect', () => {
                console.log('[Scoreboard] WebSocket reconnected');
                state.socket.emit('sync:request');
            });

            // ---- EVENT HANDLERS ----

            // Score updates (backward compat with score:updated)
            state.socket.on('score:updated', (eventData) => {
                const scoreData = eventData.data;
                if (scoreData) updateTeamScore(scoreData);
            });

            // Score adjustments (Task 14: admin score changes)
            state.socket.on('score:adjusted', (eventData) => {
                const data = eventData.data;
                if (data?.teamScore) {
                    console.log('[Scoreboard] Score adjusted:', data.teamScore.teamId);
                    updateTeamScore(data.teamScore);
                }
            });

            // Group completions
            state.socket.on('group:completed', (eventData) => {
                const data = eventData.data;
                console.log('[Scoreboard] Group completed:', data);
            });

            // Transaction events (Task 14: enriched with owner + teamScore)
            state.socket.on('transaction:new', (eventData) => {
                const data = eventData.data;
                const transaction = data?.transaction;
                if (transaction) {
                    console.log('[Scoreboard] New transaction:', transaction.tokenId, 'owner:', transaction.owner);
                    addEvidence(transaction);
                }
                // Update ticker from teamScore if present
                if (data?.teamScore) {
                    updateTeamScore(data.teamScore);
                }
            });

            // Transaction deleted
            state.socket.on('transaction:deleted', (eventData) => {
                const data = eventData.data;
                if (data) {
                    console.log('[Scoreboard] Transaction deleted:', data);
                    removeEvidence(data.transactionId, data.tokenId, data.teamId);
                }
            });

            // Session updates (Task 9: boundary detection)
            state.socket.on('session:update', (eventData) => {
                const data = eventData.data;
                console.log('[Scoreboard] Session update:', data);

                // Detect new session by ID comparison
                if (data.id && data.id !== state.sessionId) {
                    handleSessionBoundary(data.id);
                    renderEvidence();
                    renderTicker();
                }

                // Handle session ended
                if (data.status === 'ended') {
                    stopPageCycling();
                    stopCountdown();
                }

                // Initialize any new teams
                if (data.teams && Array.isArray(data.teams)) {
                    data.teams.forEach(teamId => {
                        if (!state.teamScores.has(teamId)) {
                            state.teamScores.set(teamId, {
                                teamId, currentScore: 0, baseScore: 0, bonusPoints: 0,
                                tokensScanned: 0, completedGroups: [], adminAdjustments: []
                            });
                        }
                    });
                    renderTicker();
                }
            });

            // Scores reset
            state.socket.on('scores:reset', (eventData) => {
                console.log('[Scoreboard] Scores reset');

                // Clear all scores but keep teams
                state.teamScores.forEach((score, teamId) => {
                    state.teamScores.set(teamId, {
                        teamId, currentScore: 0, baseScore: 0, bonusPoints: 0,
                        tokensScanned: 0, completedGroups: [], adminAdjustments: []
                    });
                });

                // Clear evidence
                state.evidenceByOwner.clear();
                state.pages = [];
                state.currentPage = 0;
                stopPageCycling();

                renderEvidence();
                renderTicker();
            });

            // Full sync (Task 9: REPLACE not append)
            state.socket.on('sync:full', (eventData) => {
                const data = eventData.data;
                console.log('[Scoreboard] Full sync received');

                // Session boundary detection
                const sessionId = data.session?.id;
                if (sessionId) {
                    handleSessionBoundary(sessionId);
                }

                // REPLACE scores (not append)
                state.teamScores.clear();
                if (data.scores && Array.isArray(data.scores)) {
                    data.scores.forEach(score => {
                        state.teamScores.set(score.teamId, score);
                    });
                }

                // REPLACE evidence (not append) -- fixes stale data bug
                state.evidenceByOwner.clear();
                if (data.recentTransactions && Array.isArray(data.recentTransactions)) {
                    data.recentTransactions
                        .filter(tx => tx.mode === 'detective')
                        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))  // Chronological
                        .forEach(tx => {
                            const owner = tx.owner || 'Unknown';
                            if (!state.evidenceByOwner.has(owner)) {
                                state.evidenceByOwner.set(owner, { entries: [], lastExposed: null });
                            }
                            const group = state.evidenceByOwner.get(owner);
                            group.entries.push({
                                id: tx.id || `${tx.tokenId}-${tx.teamId}`,
                                tokenId: tx.tokenId,
                                timestamp: tx.timestamp,
                                summary: tx.summary || tx.tokenId,
                            });
                            group.lastExposed = new Date(tx.timestamp);
                        });
                }

                // Sync countdown from gameClock
                if (data.gameClock) {
                    syncCountdown(data.gameClock);
                }

                // Render everything
                renderEvidence();
                renderTicker();
            });

            // Game clock updates via service:state
            state.socket.on('service:state', (eventData) => {
                const data = eventData.data;
                if (data?.domain === 'gameclock' && data.state) {
                    syncCountdown(data.state);
                }
            });

            // Display mode changes
            state.socket.on('display:mode', (eventData) => {
                const data = eventData.data;
                console.log('[Scoreboard] Display mode event:', data);
                handleDisplayMode(data);
            });
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function initialize() {
            console.log('[Scoreboard] Initializing Evidence Board...');
            initModes();

            const authenticated = await authenticate();
            if (!authenticated) return;

            await fetchTokenTotals();
            await connectWebSocket();

            // Token refresh cycle
            setInterval(async () => {
                console.log('[Scoreboard] Refreshing token...');
                await authenticate();
                if (state.socket && state.socket.connected) {
                    state.socket.disconnect();
                    await connectWebSocket();
                }
            }, CONFIG.tokenRefreshInterval);
        }

        // Start
        initialize();
    </script>
</body>
</html>
